<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이거 먹어도 될까?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap');

:root{
  --paper:#EFF3EC;
  --paper-card:#FFFFFF;
  --ink:#26332B;
  --ink-soft:#5B6960;
  --line:#D8DED3;
  --safe:#2F7A56;
  --safe-bg:#E4F1E9;
  --avoid:#AE3A2E;
  --avoid-bg:#F8E4E1;
  --unknown:#7A7A7A;
  --unknown-bg:#EDEDED;
  --radius:18px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:
    radial-gradient(circle at 1px 1px, rgba(38,51,43,0.05) 1px, transparent 1px) 0 0/22px 22px,
    var(--paper);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.stage{
  width:100%;
  max-width:460px;
  position:relative;
}

/* ---------- shared ---------- */
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.14em;
  color:var(--ink-soft);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}
.eyebrow::before{
  content:"";
  width:16px;height:1px;
  background:var(--ink-soft);
  display:inline-block;
}

.card{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:0 1px 0 rgba(38,51,43,0.04), 0 12px 30px -18px rgba(38,51,43,0.25);
  padding:32px 26px;
}

button{font-family:inherit;cursor:pointer;}

/* ---------- SCREEN 1 : SEARCH ---------- */
#screen-search{animation:fade-in .35s ease;}
@keyframes fade-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.title-block{margin:22px 0 26px;}
h1{
  font-family:'Noto Serif KR',serif;
  font-weight:900;
  font-size:clamp(28px,7vw,34px);
  line-height:1.28;
  margin:10px 0 8px;
}
.title-sub{
  color:var(--ink-soft);
  font-size:14.5px;
  line-height:1.6;
}

.search-row{
  display:flex;
  gap:8px;
  margin-top:6px;
}
.search-wrap{
  flex:1;
  position:relative;
  border:1.5px dashed var(--ink);
  border-radius:12px;
  background:#FBFCF9;
}
.search-wrap input{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  padding:15px 16px;
  font-size:16px;
  font-family:inherit;
  color:var(--ink);
}
.search-wrap input::placeholder{color:#9AA69C;}
.go-btn{
  border:none;
  background:var(--ink);
  color:var(--paper);
  border-radius:12px;
  padding:0 20px;
  font-size:15px;
  font-weight:700;
  transition:transform .15s ease, background .15s ease;
}
.go-btn:active{transform:scale(0.94);}

.disclaimer{
  margin-top:28px;
  font-size:11.5px;
  color:var(--ink-soft);
  line-height:1.6;
  border-top:1px solid var(--line);
  padding-top:14px;
}

/* ---------- SCREEN 2 : RESULT ---------- */
#screen-result{display:none;}
#screen-result.active{display:block;animation:fade-in .3s ease;}

.back-btn{
  border:none;background:none;
  color:var(--ink-soft);
  font-size:13px;
  font-family:'IBM Plex Mono',monospace;
  display:flex;align-items:center;gap:6px;
  margin-bottom:18px;
  padding:4px 0;
}
.back-btn:hover{color:var(--ink);}

.result-card{
  text-align:center;
  padding:36px 26px 30px;
  position:relative;
  overflow:hidden;
}

.query-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  letter-spacing:0.06em;
}

.stamp-zone{
  position:relative;
  width:150px;height:150px;
  margin:18px auto 8px;
}
.stamp-svg{
  width:100%;height:100%;
  opacity:0;
  transform:scale(1.7) rotate(-14deg);
}
.stamp-svg.pop{
  animation:stamp-down .55s cubic-bezier(.2,1.6,.4,1) forwards;
}
@keyframes stamp-down{
  0%{opacity:0; transform:scale(2.2) rotate(-18deg);}
  55%{opacity:1; transform:scale(0.92) rotate(-6deg);}
  75%{transform:scale(1.06) rotate(-9deg);}
  100%{opacity:1; transform:scale(1) rotate(-7deg);}
}

.result-word{
  font-family:'Noto Serif KR',serif;
  font-weight:900;
  font-size:26px;
  margin:4px 0 2px;
}
.result-name{
  font-size:15px;
  color:var(--ink-soft);
  margin-bottom:20px;
}

.result-detail{
  text-align:left;
  border-top:1px solid var(--line);
  padding-top:20px;
  margin-top:6px;
}
.result-detail h3{
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin:0 0 8px;
  text-transform:uppercase;
}
.result-detail p{
  font-size:14.5px;
  line-height:1.7;
  margin:0 0 18px;
  color:var(--ink);
}
.result-detail .tip{
  background:var(--paper);
  border-radius:12px;
  padding:14px 16px;
  font-size:13.5px;
  line-height:1.65;
  color:var(--ink-soft);
}

.ai-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:0.05em;
  color:var(--ink-soft);
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:999px;
  padding:4px 10px;
  margin:0 0 18px;
}

.spinner{
  width:56px;height:56px;
  border-radius:50%;
  border:3px dashed var(--ink-soft);
  animation:spin 1.1s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  color:var(--ink-soft);
  margin-top:12px;
}

.retry-btn{
  width:100%;
  margin-top:22px;
  border:1.5px solid var(--ink);
  background:transparent;
  color:var(--ink);
  border-radius:12px;
  padding:14px;
  font-size:14.5px;
  font-weight:700;
  transition:background .15s ease, color .15s ease;
}
.retry-btn:hover{background:var(--ink); color:var(--paper);}

@media (max-width:380px){
  .card{padding:24px 18px;}
}

.top-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.settings-btn{
  border:1px solid var(--line);
  background:#FBFCF9;
  border-radius:10px;
  width:34px;height:34px;
  font-size:15px;
  color:var(--ink-soft);
  transition:border-color .15s ease, color .15s ease;
}
.settings-btn:hover{border-color:var(--ink); color:var(--ink);}

.settings-panel{
  display:none;
  margin-top:14px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#FBFCF9;
}
.settings-panel.open{display:block;}
.settings-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  color:var(--ink-soft);
  margin:0 0 8px;
}
.settings-row{display:flex; gap:8px;}
.settings-row input{
  flex:1;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
  background:#fff;
  outline:none;
}
.settings-row input:focus{border-color:var(--ink);}
.settings-save-btn{
  border:none;
  background:var(--ink);
  color:var(--paper);
  border-radius:10px;
  padding:0 16px;
  font-size:13.5px;
  font-weight:700;
}
.settings-status{
  font-size:12px;
  color:var(--ink-soft);
  margin:8px 0 0;
}
.settings-status.warn{color:var(--avoid);}
.settings-status.ok{color:var(--safe);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="stage">

  <!-- SCREEN 1: SEARCH -->
  <div id="screen-search">
    <div class="top-row">
      <div class="eyebrow">임산부 식품 확인</div>
      <button class="settings-btn" id="settings-btn" aria-label="설정" title="API 키 설정">⚙</button>
    </div>

    <div class="settings-panel" id="settings-panel">
      <p class="settings-label">Anthropic API 키 (이 기기에만 저장돼요)</p>
      <div class="settings-row">
        <input id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off">
        <button class="settings-save-btn" id="settings-save-btn">저장</button>
      </div>
      <p class="settings-status" id="settings-status"></p>
    </div>

    <div class="title-block">
      <h1>이거,<br>먹어도 될까요?</h1>
      <p class="title-sub">재료 이름을 적어주세요</p>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <input id="query-input" type="text" inputmode="search" enterkeyhint="search" placeholder="예: 커피, 초밥, 계란..." autocomplete="off">
      </div>
      <button class="go-btn" id="go-btn">확인</button>
    </div>

    <div class="disclaimer">
      본 서비스는 일반적인 정보 참고용이며 의학적 진단이나 처방을 대신하지 않습니다. 개인 건강 상태에 따라 다를 수 있으니 정확한 판단은 반드시 산부인과 전문의와 상담하세요. DB에 없는 재료는 두 분이 함께 보는 목록에 저장됩니다.
    </div>
  </div>

  <!-- SCREEN 2: RESULT -->
  <div id="screen-result">
    <button class="back-btn" id="back-btn">← 다시 검색하기</button>
    <div class="card result-card">
      <div class="query-label" id="query-label">// 검색어</div>

      <div class="stamp-zone" id="stamp-zone"></div>

      <div class="result-word" id="result-word"></div>
      <div class="result-name" id="result-name"></div>
      <div class="ai-badge" id="ai-badge" style="display:none;">⚡ AI 실시간 답변 · 참고용</div>

      <div class="result-detail">
        <h3>왜 그런가요</h3>
        <p id="result-reason"></p>
        <div class="tip" id="result-tip"></div>
      </div>

      <button class="retry-btn" id="retry-btn">다른 재료 검색하기</button>
    </div>
  </div>

</div>

<script>
// ---------- DATA ----------
// result: 'safe' | 'avoid'
const FOODS = [
  {names:["커피","카페인","아메리카노","커피믹스","드립커피"], result:"safe", title:"커피 / 카페인 음료",
    reason:"카페인은 태반을 통과하지만, 하루 총 섭취량을 200mg 이하로 유지하면 안전한 범위로 알려져 있어요.",
    tip:"원두커피 한 잔(약 95mg) 정도는 괜찮지만, 커피믹스·에너지드링크·초콜릿의 카페인까지 합산해서 하루 200mg을 넘기지 마세요."},
  {names:["홍차"], result:"safe", title:"홍차",
    reason:"카페인이 포함되어 있지만 하루 총 카페인 섭취량(200mg 이하) 안에서는 안전해요.",
    tip:"연하게 우려 하루 1~2잔 정도로 마시고, 다른 카페인 음료와 합산해서 관리하세요."},
  {names:["녹차"], result:"safe", title:"녹차",
    reason:"카페인과 탄닌 성분이 있지만 적당량에서는 안전한 것으로 알려져 있어요.",
    tip:"탄닌이 철분 흡수를 방해할 수 있으니 식사와 시간차를 두고, 하루 1~2잔 이내로 마시세요."},
  {names:["술","알코올","와인","맥주","소주","막걸리"], result:"avoid", title:"술 / 알코올",
    reason:"임신 중 안전한 알코올 섭취량은 없는 것으로 알려져 있어요. 태아알코올증후군 등 발달 문제 위험이 보고됩니다.",

  {names:["초밥","회","생선회","광어회","연어회"], result:"avoid", title:"회 / 초밥(생선)",

    tip:"꼭 먹고 싶다면 완전히 익힌 초밥(새우, 장어 등)이나 냉동 처리된 제품 여부를 확인하세요."},
  {names:["육회","생고기","타르타르"], result:"avoid", title:"육회 / 생고기",
    reason:"살모넬라, 톡소플라즈마 등 세균·기생충 감염 위험이 커요.",
    tip:"고기는 중심 온도까지 완전히 익혀 섭취하세요."},
  {names:["훈제연어","훈제연어냉훈"], result:"avoid", title:"훈제 연어(냉훈제)",

    tip:"파스타·볶음 등 뜨겁게 완전히 데워 먹으면 위험을 크게 줄일 수 있어요."},
  {names:["참치캔","참치통조림","가다랑어"], result:"safe", title:"참치 통조림(가다랑어)",
    reason:"작은 어종이라 수은 함량이 낮은 편이라 안전한 범위로 알려져 있어요.",
    tip:"그래도 주 2~3회 이내로 섭취량을 제한하는 것을 권장해요."},
  {names:["참치","황새치","상어","삼치대형","눈다랑어","다랑어"], result:"avoid", title:"대형 참치류(황새치·눈다랑어 등)",

  {names:["고등어"], result:"safe", title:"고등어",
    reason:"등푸른 생선은 오메가3가 풍부하고, 수은 수준도 안전 범위로 알려져 있어요.",

  {names:["새우"], result:"safe", title:"새우",

  {names:["게","꽃게"], result:"safe", title:"게(익힌 것)",

  {names:["굴","생굴"], result:"avoid", title:"굴(생굴)",

  {names:["브리치즈","카망베르","비살균치즈","소프트치즈"], result:"avoid", title:"비살균 소프트치즈(브리·카망베르 등)",

  {names:["우유"], result:"safe", title:"우유(저온살균)",

function normalize(s){
  return s.toLowerCase().replace(/\s+/g,"");
}

function findFood(query){
  const q = normalize(query);
  if(!q) return null;

  // 1. 완전 일치
  let hit = FOODS.find(f => f.names.some(n => normalize(n) === q));
  if(hit) return hit;

  // 2. 조사만 붙은 경우 (예: "커피요", "고등어는") — 조사를 떼고 다시 완전 일치 확인
  const JOSA = ["이나","이랑","으로","에서","까지","부터","이","가","은","는","을","를","도","만","과","와","랑","로","에","의","요","좀"];
  for(const j of JOSA){
    if(q.endsWith(j) && q.length > j.length){
      const stripped = q.slice(0, q.length - j.length);
      hit = FOODS.find(f => f.names.some(n => normalize(n) === stripped));
      if(hit) return hit;
    }
  }

  // 3. 마지막 글자가 중복된 오타 (예: "고등어" → "고등어어")
  hit = FOODS.find(f => f.names.some(n => {
    const nn = normalize(n);
    return q.length === nn.length + 1 && q.startsWith(nn) && q[q.length - 1] === nn[nn.length - 1];
  }));
  if(hit) return hit;

  // 4. 마지막 한 글자가 빠진 경우 (예: IME 조합 중 잘림 대비 안전망)
  hit = FOODS.find(f => f.names.some(n => {
    const nn = normalize(n);
    return nn.length - q.length === 1 && nn.startsWith(q);
  }));
  if(hit) return hit;

  return null;
}

function stampSVG(kind, color){
  const stroke = color;
  const filterId = "rough-"+kind+"-"+Math.floor(Math.random()*99999);
  const common = `
    <defs>
      <filter id="${filterId}" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7"/>
      </filter>
    </defs>`;
  if(kind === "o"){
    return `<svg class="stamp-svg" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
      ${common}
      <circle cx="75" cy="75" r="52" fill="none" stroke="${stroke}" stroke-width="9" filter="url(#${filterId})" opacity="0.9"/>
    </svg>`;
  }
  if(kind === "x"){
    return `<svg class="stamp-svg" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
      ${common}
      <line x1="32" y1="32" x2="118" y2="118" stroke="${stroke}" stroke-width="10" stroke-linecap="round" filter="url(#${filterId})" opacity="0.9"/>
      <line x1="118" y1="32" x2="32" y2="118" stroke="${stroke}" stroke-width="10" stroke-linecap="round" filter="url(#${filterId})" opacity="0.9"/>
    </svg>`;
  }
  // unknown = question mark
  return `<svg class="stamp-svg" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    ${common}
    <text x="75" y="105" text-anchor="middle" font-family="Noto Serif KR, serif" font-weight="900" font-size="90" fill="${stroke}" filter="url(#${filterId})" opacity="0.9">?</text>
  </svg>`;
}

function colorFor(result){
  if(result==="safe") return getComputedColor("--safe");
  if(result==="avoid") return getComputedColor("--avoid");
  return getComputedColor("--unknown");
}
function getComputedColor(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

  screenResult.classList.add("active");

  document.getElementById("query-label").textContent = "// '" + query + "' 검색 결과";
  document.getElementById("result-word").textContent = "확인하고 있어요...";
  document.getElementById("result-word").style.color = "var(--ink-soft)";
  document.getElementById("result-name").textContent = "";
  document.getElementById("ai-badge").style.display = "none";

  const stampZone = document.getElementById("stamp-zone");
  stampZone.innerHTML = '<div class="spinner"></div><div class="loading-text">DB에 없는 재료라 AI에게 실시간으로 물어보는 중</div>';

  document.getElementById("result-reason").textContent = "";
  document.getElementById("result-tip").textContent = "";
}

function showResult(query, food, errorType){
  const screenSearch = document.getElementById("screen-search");
  const screenResult = document.getElementById("screen-result");
  screenSearch.style.display = "none";
  screenResult.classList.add("active");

  const result = food ? food.result : "unknown";
  const meta = RESULT_META[result];
  const color = colorFor(result);

  document.getElementById("query-label").textContent = "// '" + query + "' 검색 결과";
  document.getElementById("result-word").textContent = meta.word;
  document.getElementById("result-word").style.color = color;
  document.getElementById("result-name").textContent = food ? food.title : query;

  const badge = document.getElementById("ai-badge");
  badge.style.display = (food && food.ai) ? "inline-flex" : "none";

  const stampZone = document.getElementById("stamp-zone");
  stampZone.innerHTML = stampSVG(meta.symbol, color);
  // trigger animation
  requestAnimationFrame(()=>{
    const svg = stampZone.querySelector("svg");
    void svg.offsetWidth;
    svg.classList.add("pop");
  });

  const reasonEl = document.getElementById("result-reason");
  const tipEl = document.getElementById("result-tip");
  if(food){
    reasonEl.textContent = food.reason;
    tipEl.textContent = "TIP  " + food.tip;
  } else if(errorType === "not_food"){
    reasonEl.textContent = "AI가 이 검색어를 식품/재료로 인식하지 못했어요. 재료명을 정확히 입력했는지 확인해주세요.";
    tipEl.textContent = "TIP  다른 표현으로 다시 검색해보시거나, 정 안 되면 산부인과 전문의·영양사에게 직접 문의해보세요.";
  } else if(errorType){
    reasonEl.textContent = "일시적인 오류로 AI 조회에 실패했어요 (원인: " + errorType + "). 재료 문제가 아니라 네트워크나 API 쪽 문제일 가능성이 커요.";
    tipEl.textContent = "TIP  잠시 후 다시 검색해보시거나, 콘솔(Console Messages)의 [food-check] 로그를 확인해주세요.";
  } else {
    reasonEl.textContent = "아직 이 재료에 대한 정보가 없어요. 잘못된 정보를 드리는 것보다 모른다고 말씀드리는 게 안전하다고 판단했어요.";
    tipEl.textContent = "TIP  정확한 재료명으로 다시 검색해보시거나, 산부인과 전문의·영양사에게 직접 문의해보세요.";
  }
}

async function fetchAIJudgment(query){
  const apiKey = getApiKey();
  if(!apiKey){
    return { error: "no_key" };
  }
  try{
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:400,
        messages:[{
          role:"user",
          content: "당신은 임신부 식품 안전성 정보를 제공하는 도우미입니다. 아래 재료에 대해 임신부가 섭취해도 되는지 O 또는 X로만 판단해주세요.\n\n재료: \"" + query + "\"\n\n다음 JSON 형식으로만 답하세요. 다른 텍스트, 설명, 마크다운 코드블록 없이 순수 JSON 객체 하나만 출력하세요.\n\n{\"valid\": true 또는 false (식품/재료로 인식 가능한지), \"result\": \"safe\" 또는 \"avoid\" (중간 단계 없이 둘 중 하나로만 판단. 조건부로 괜찮은 경우는 reason과 tip에서 조건을 설명하되 result는 더 안전한 쪽 기준으로 정하세요), \"title\": \"재료명 짧게\", \"reason\": \"왜 그런지 한국어로 2문장 이내\", \"tip\": \"실천 팁 한국어로 1문장\"}\n\n식품, 음료, 재료가 아니거나 판단이 불확실하면 valid를 false로 하세요."
        }]
      })
    });
    console.log("[food-check] HTTP status:", resp.status, resp.statusText);

    const rawText = await resp.text();
    console.log("[food-check] raw response:", rawText.slice(0, 800));

    if(resp.status === 401){
      console.error("[food-check] invalid API key");
      return { error: "invalid_key" };
    }
    if(!resp.ok){
      console.error("[food-check] API returned non-OK status:", resp.status);
      return { error: "api_error" };
    }

    let data;
    try{
      data = JSON.parse(rawText);
    }catch(parseErr){
      console.error("[food-check] top-level JSON.parse failed:", parseErr);
      return { error: "parse_error" };
    }

    const textBlock = (data.content || []).find(b => b.type === "text");
    if(!textBlock){
      console.error("[food-check] no text block in response. content was:", data.content);
      return { error: "no_text_block" };
    }
    let clean = textBlock.text.trim();
    clean = clean.replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
    let parsed;
    try{
      parsed = JSON.parse(clean);
    }catch(parseErr){
      console.error("[food-check] inner JSON.parse failed. text was:", clean, parseErr);
      return { error: "parse_error" };
    }
    if(!parsed.valid) return { error: "not_food" };
    if(!["safe","avoid"].includes(parsed.result)) return { error: "not_food" };
    return {
      result: parsed.result,
      title: parsed.title || query,
      reason: parsed.reason || "",
      tip: parsed.tip || "",
      ai: true
    };
  }catch(e){
    console.error("[food-check] fetch/network error:", e);
    return { error: "network_error" };
  }
}

function resetToSearch(){
  document.getElementById("screen-search").style.display = "block";
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("query-input").value = "";
  document.getElementById("query-input").focus();
}

async function getCachedFood(normQuery){
  if(!supabaseClient) return null;
  try{
    const { data, error } = await supabaseClient
      .from("foods")
      .select("*")
      .eq("query_key", normQuery)
      .maybeSingle();
    if(error){
      console.error("[food-check] supabase select error:", error);
      return null;
    }
    if(!data) return null;
    return {
      result: data.result,
      title: data.title,
      reason: data.reason,
      tip: data.tip,
      ai: true
    };
  }catch(e){
    console.error("[food-check] supabase select failed:", e);
    return null;
  }
}

async function cacheFood(normQuery, foodObj){
  if(!supabaseClient) return;
  try{
    const { error } = await supabaseClient
      .from("foods")
      .upsert({
        query_key: normQuery,
        title: foodObj.title,
        result: foodObj.result,
        reason: foodObj.reason,
        tip: foodObj.tip,
        source: "ai"
      }, { onConflict: "query_key" });
    if(error) console.error("[food-check] supabase upsert error:", error);
  }catch(e){
    console.error("[food-check] cache save failed:", e);
  }
}

function showKeyNeededResult(query, invalid){
  const screenSearch = document.getElementById("screen-search");
  const screenResult = document.getElementById("screen-result");
  screenSearch.style.display = "none";
  screenResult.classList.add("active");

  document.getElementById("query-label").textContent = "// '" + query + "' 검색 결과";
  document.getElementById("result-word").textContent = invalid ? "API 키를 확인해주세요" : "API 키가 필요해요";
  document.getElementById("result-word").style.color = colorFor("unknown");
  document.getElementById("result-name").textContent = "";
  document.getElementById("ai-badge").style.display = "none";

  const stampZone = document.getElementById("stamp-zone");
  stampZone.innerHTML = stampSVG("q", colorFor("unknown"));
  requestAnimationFrame(()=>{
    const svg = stampZone.querySelector("svg");
    void svg.offsetWidth;
    svg.classList.add("pop");
  });

  document.getElementById("result-reason").textContent = invalid
    ? "저장된 API 키가 유효하지 않은 것 같아요. 설정에서 키를 다시 확인해주세요."
    : "DB에 없는 재료라 AI로 확인하려면 먼저 설정(⚙)에서 Anthropic API 키를 입력해야 해요.";
  document.getElementById("result-tip").textContent = "TIP  검색 화면으로 돌아가 오른쪽 위 톱니바퀴(⚙)를 눌러 키를 입력해주세요.";
}

async function handleQuery(q){
  if(!q) return;
  const normQ = normalize(q);

  const food = findFood(q);
  if(food){
    showResult(q, food);
    return;
  }

  // 부부가 공유하는 Supabase 캐시부터 확인 — 근처에서 없으면 스피너 없이 바로 반환
  const cached = await getCachedFood(normQ);
  if(cached){
    showResult(q, cached);
    return;
  }

  if(!getApiKey()){
    showKeyNeededResult(q, false);
    return;
  }

  showLoading(q);
  const aiFood = await fetchAIJudgment(q);

  if(aiFood && aiFood.error === "invalid_key"){
    showKeyNeededResult(q, true);
    return;
  }
  if(aiFood && !aiFood.error){
    cacheFood(normQ, aiFood);
    showResult(q, aiFood);
    return;
  }
  showResult(q, null, aiFood ? aiFood.error : "unknown_error");
}

function runSearch(){
  const input = document.getElementById("query-input");
  const q = input.value.trim();
  if(!q) { input.focus(); return; }
  handleQuery(q);
}

document.getElementById("go-btn").addEventListener("click", runSearch);

// 설정 패널: API 키 입력/저장
const settingsBtn = document.getElementById("settings-btn");
const settingsPanel = document.getElementById("settings-panel");
const apiKeyInput = document.getElementById("api-key-input");
const settingsStatus = document.getElementById("settings-status");

function refreshSettingsStatus(){
  const key = getApiKey();
  if(key){
    settingsStatus.textContent = "✓ 키가 저장되어 있어요 (이 기기에만)";
    settingsStatus.className = "settings-status ok";
    apiKeyInput.value = key;
  } else {
    settingsStatus.textContent = "아직 키가 없어요. DB에 없는 재료는 검색이 안 돼요.";
    settingsStatus.className = "settings-status warn";
  }
}
refreshSettingsStatus();

settingsBtn.addEventListener("click", ()=>{
  settingsPanel.classList.toggle("open");
});

document.getElementById("settings-save-btn").addEventListener("click", ()=>{
  const val = apiKeyInput.value.trim();
  if(!val){
    settingsStatus.textContent = "키를 입력해주세요.";
    settingsStatus.className = "settings-status warn";
    return;
  }
  setApiKey(val);
  refreshSettingsStatus();
});

let isComposing = false;
const queryInput = document.getElementById("query-input");
queryInput.addEventListener("compositionstart", ()=>{ isComposing = true; });
queryInput.addEventListener("compositionend", ()=>{ isComposing = false; });
queryInput.addEventListener("keydown", (e)=>{
  // 한글(IME) 조합 중에 눌린 Enter는 무시 — 글자 조합이 아직 안 끝난 상태라
  // 그대로 검색하면 마지막 글자가 잘리거나 아예 반응하지 않을 수 있어요.
  if(e.key === "Enter" && !isComposing && e.keyCode !== 229){
    runSearch();
  }
});
document.getElementById("back-btn").addEventListener("click", resetToSearch);
document.getElementById("retry-btn").addEventListener("click", resetToSearch);
</script>
